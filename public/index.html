<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FkWeChat - 微信插件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .navbar {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
    }
    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }
    .nav-links {
      display: flex;
      gap: 24px;
    }
    .nav-links a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    .nav-links a:hover {
      color: #fff;
      transform: translateY(-2px);
    }
    .hero {
      padding: 80px 40px;
      text-align: center;
      color: #fff;
    }
    .hero h1 {
      font-size: 56px;
      font-weight: 800;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .hero p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: #fff;
      color: #667eea;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255, 255, 255, 0.4);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
    }
    .features {
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.1);
    }
    .features h2 {
      text-align: center;
      color: #fff;
      font-size: 32px;
      margin-bottom: 48px;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .feature-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 32px;
      border-radius: 16px;
      color: #fff;
      transition: all 0.3s ease;
    }
    .feature-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.2);
    }
    .feature-card h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }
    .feature-card p {
      opacity: 0.8;
      line-height: 1.6;
    }
    .footer {
      padding: 32px 40px;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .navbar {
        padding: 12px 20px;
      }
      .hero h1 {
        font-size: 36px;
      }
      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=wechat%20plugin%20icon%20modern%20gradient&image_size=square" alt="FkWeChat">
      <span>FkWeChat</span>
    </div>
    <div class="nav-links">
      <a href="#features">功能介绍</a>
      <a href="https://github.com/yunjavapro/FkWeChat" target="_blank">GitHub</a>
      <a href="https://yunjavapro.github.io/FkWeChat_Plugin_Docs" target="_blank">文档</a>
    </div>
  </nav>

  <section class="hero">
    <h1>FkWeChat</h1>
    <p>强大的微信插件，为您的微信体验增添无限可能</p>
    <div class="btn-group">
      <a href="https://github.com/yunjavapro/FkWeChat/releases" target="_blank" class="btn btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        下载最新版本
      </a>
      <a href="#features" class="btn btn-secondary">了解更多</a>
    </div>
  </section>

  <section class="features" id="features">
    <h2>核心功能</h2>
    <div class="features-grid">
      <div class="feature-card">
        <h3>消息增强</h3>
        <p>扩展微信消息功能，支持更多格式和自定义操作</p>
      </div>
      <div class="feature-card">
        <h3>自动回复</h3>
        <p>智能自动回复，解放您的双手，高效处理消息</p>
      </div>
      <div class="feature-card">
        <h3>数据管理</h3>
        <p>便捷的消息记录管理和导出功能</p>
      </div>
      <div class="feature-card">
        <h3>安全可靠</h3>
        <p>严格的数据保护机制，确保您的隐私安全</p>
      </div>
      <div class="feature-card">
        <h3>轻量高效</h3>
        <p>占用资源少，运行流畅，不影响微信性能</p>
      </div>
      <div class="feature-card">
        <h3>持续更新</h3>
        <p>定期更新维护，持续优化用户体验</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 FkWeChat. All rights reserved.</p>
  </footer>
</body>
</html>
